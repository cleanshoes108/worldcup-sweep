<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Martin Family World Cup Sweep</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08080f;
  --s1:#111118;     /* card surface */
  --s2:#18181f;     /* elevated */
  --s3:#22222c;     /* row / pill bg */
  --bd:rgba(255,255,255,.12);
  --bd2:rgba(255,255,255,.22);
  --tx:#ffffff;
  --tx2:rgba(255,255,255,.82);  /* AA: ~8:1 on dark bg */
  --tx3:rgba(255,255,255,.64);  /* AA: ~6:1 on dark bg */
  --win:#00c853;
  --win-bg:rgba(0,200,83,.09);
  --win-bd:rgba(0,200,83,.38);
  --draw:#ffd600;
  --draw-bg:rgba(255,214,0,.07);
  --draw-bd:rgba(255,214,0,.32);
  --live:#ff1744;
  --r:14px;
  --r2:10px;
  --maxw:700px;
}
:root{--cL:#e23b3b;--cA:#4a86c7;--cJ:#e8a766;--cS:#4fb0a5;--cC:#8b5cc7;--cN:#e8902e;}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;background:var(--bg);color:var(--tx);font-family:"DM Sans",system-ui,sans-serif;
  font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 15px;}

/* вФАвФА HEADER вФАвФА */
.hdr{position:sticky;top:0;z-index:50;
  background:rgba(8,8,15,.88);backdrop-filter:blur(18px) saturate(160%);
  border-bottom:1px solid var(--bd);
  padding-top:env(safe-area-inset-top);}
.hdr-inner{max-width:var(--maxw);margin:0 auto;padding:13px 15px;
  display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:"Archivo",sans-serif;font-weight:900;font-size:15px;
  letter-spacing:.03em;text-transform:uppercase;line-height:1.15;color:var(--tx);}
.hdr-title small{display:block;font-family:"DM Mono",monospace;font-weight:400;
  font-size:12px;letter-spacing:.16em;color:var(--tx3);margin-bottom:2px;}
.hdr-status{margin-left:auto;display:flex;align-items:center;gap:7px;
  font-family:"DM Mono",monospace;font-size:13px;color:var(--tx3);}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--tx3);flex:0 0 auto;}
.is-live .pulse{background:var(--live);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.rfbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--bd2);
  background:var(--s2);color:var(--tx2);cursor:pointer;display:grid;place-items:center;}
.rfbtn svg{width:18px;height:18px;}
.rfbtn.spin{animation:rot .7s linear;}
@keyframes rot{to{transform:rotate(360deg)}}
/* FIFA 4-colour stripe */
.stripe{height:4px;background:linear-gradient(90deg,#7c3aed 0% 25%,#dc2626 25% 50%,#16a34a 50% 75%,#2563eb 75%);}

/* вФАвФА SECTION LABELS вФАвФА */
.slabel{font-family:"DM Mono",monospace;font-size:13px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--tx3);margin:26px 0 11px;}

/* вФАвФА LEADERBOARD вФАвФА */
.board{background:var(--s1);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;}
.board-head{display:flex;align-items:center;gap:10px;padding:13px 16px;
  background:var(--s2);border-bottom:1px solid var(--bd);}
.board-head h2{font-family:"Archivo",sans-serif;font-weight:900;text-transform:uppercase;
  letter-spacing:.06em;font-size:15px;color:var(--tx);margin:0;}
.board-hint{margin-left:auto;font-family:"DM Mono",monospace;font-size:13px;color:var(--tx3);}
.srows{padding:7px 8px 10px;}
.srow{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:10px;
  padding:14px 10px;border-radius:10px;cursor:pointer;position:relative;
  transition:background .13s;min-height:56px;}
.srow:hover,.srow:active{background:var(--s3);}
.srow+.srow{margin-top:2px;}
.srow .rnk{font-family:"DM Mono",monospace;font-size:14px;color:var(--tx3);text-align:center;}
.srow.top1 .rnk{color:var(--draw);}
.who{min-width:0;}
.who .nm{font-family:"Archivo",sans-serif;font-weight:900;letter-spacing:.05em;
  text-transform:uppercase;font-size:17px;color:var(--tx);
  display:flex;align-items:center;gap:8px;}
.pdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;}
.who .meta{font-size:13px;color:var(--tx3);font-family:"DM Mono",monospace;margin-top:2px;}
.barwrap{height:5px;background:rgba(255,255,255,.1);border-radius:4px;margin-top:7px;overflow:hidden;}
.bar{height:100%;width:0;border-radius:4px;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.pts-col{text-align:right;}
.pts-big{font-family:"Archivo",sans-serif;font-weight:900;font-size:23px;color:var(--tx);
  line-height:1;font-variant-numeric:tabular-nums;}
.pts-lbl{font-family:"DM Mono",monospace;font-size:12px;letter-spacing:.12em;
  color:var(--tx3);text-transform:uppercase;margin-top:3px;}
.chevron{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--tx3);}
.chevron svg{width:100%;height:100%;}
.crown{position:absolute;left:-2px;top:-8px;font-size:13px;transform:rotate(-18deg);}

.mult-row{display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-top:1px solid var(--bd);background:var(--s2);}
.mult-lab{font-size:15px;color:var(--tx2);flex:1;line-height:1.4;}
.mult-lab b{color:var(--tx);}
.sw{position:relative;width:48px;height:28px;flex:0 0 auto;}
.sw input{opacity:0;width:100%;height:100%;margin:0;cursor:pointer;}
.sw-tr{position:absolute;inset:0;border-radius:20px;background:var(--s3);
  transition:background .2s;pointer-events:none;}
.sw-th{position:absolute;width:22px;height:22px;background:var(--tx3);border-radius:50%;
  top:3px;left:3px;transition:.2s;pointer-events:none;}
.sw input:checked~.sw-tr{background:#16a34a;}
.sw input:checked~.sw-th{left:23px;background:#fff;}

/* вФАвФА FIXTURE TABS вФАвФА */
.seg{display:inline-flex;background:var(--s2);border-radius:10px;padding:3px;margin-left:auto;}
.seg button{appearance:none;border:0;background:transparent;cursor:pointer;
  font-family:"DM Sans",sans-serif;font-weight:700;font-size:15px;color:var(--tx3);
  padding:8px 16px;border-radius:8px;min-height:44px;}
.seg button.on{background:var(--s3);color:var(--tx);}

/* вФАвФА FIXTURE CARDS вФАвФА */
.fxlist{display:flex;flex-direction:column;gap:10px;}
.fxcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;
  cursor:pointer;transition:background .13s;}
.fxcard:active{background:var(--s2);}
.fxcard.sweep{border-color:var(--bd2);}
.fxtop{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-bottom:1px solid var(--bd);
  font-family:"DM Mono",monospace;font-size:13px;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.06em;}
.live-badge{display:flex;align-items:center;gap:5px;color:var(--live);font-weight:700;}
.live-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--live);
  animation:blink 1.5s infinite;}
.fxbody{padding:13px 14px 12px;}
.fxteams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.fxteam{display:flex;align-items:center;gap:8px;}
.fxteam.away{flex-direction:row-reverse;}
.fxfl{display:inline-block;}
.fxtn{font-weight:700;font-size:16px;color:var(--tx);}
.fxown{width:9px;height:9px;border-radius:50%;}
.fxscore{font-family:"Archivo",sans-serif;font-weight:900;font-size:21px;
  color:var(--tx);text-align:center;min-width:54px;font-variant-numeric:tabular-nums;}
.fxvs{font-family:"DM Mono",monospace;font-size:14px;color:var(--tx3);text-align:center;}
.fxfoot{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);
  display:flex;flex-wrap:wrap;gap:6px 14px;}
.ochip{display:inline-flex;align-items:center;gap:6px;
  font-size:14px;color:var(--tx2);}
.ochip b{color:var(--tx);}

/* вФАвФА PLAYER DRAW CARDS вФАвФА */
.pcards{display:flex;flex-direction:column;gap:18px;}
.pcard{background:var(--s1);border-radius:var(--r);border:1px solid var(--bd);
  overflow:hidden;position:relative;}
.pcard::before{content:"";position:absolute;left:0;top:14px;bottom:14px;
  width:5px;border-radius:0 3px 3px 0;background:var(--pc);}
.pcard-head{display:flex;align-items:center;gap:12px;padding:15px 18px 13px 22px;
  border-bottom:1px solid var(--bd);}
.pcard-head .pdot{width:20px;height:20px;}
.pcard-pn{font-family:"Archivo",sans-serif;font-weight:900;text-transform:uppercase;
  letter-spacing:.05em;font-size:21px;color:var(--tx);}
.pcard-tc{margin-left:auto;font-family:"DM Mono",monospace;font-size:13px;
  color:var(--tx3);background:var(--s3);padding:5px 10px;border-radius:16px;}
.pcard-pts{margin-left:8px;font-family:"Archivo",sans-serif;font-weight:900;
  font-size:19px;color:var(--draw);font-variant-numeric:tabular-nums;}
.tmlist{padding:9px 10px 12px;}
.tmrow{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:10px;
  padding:12px 12px;border-radius:10px;background:var(--s2);cursor:pointer;
  transition:background .13s;}
.tmrow+.tmrow{margin-top:6px;}
.tmrow:active{background:var(--s3);}
.tmrow.elim{opacity:.5;}
.tmfl{display:inline-block;}
.tmnm{font-weight:700;color:var(--tx);font-size:16px;}
.tmnm small{display:block;font-family:"DM Mono",monospace;font-weight:400;
  font-size:13px;color:var(--tx3);margin-top:2px;}
.tm-chev{width:16px;height:16px;color:var(--tx3);flex:0 0 auto;}
.tm-chev svg{width:100%;height:100%;}

/* вФАвФА TOP SCORERS (Golden Boot) вФАвФА */
.scorerlist{padding:8px 8px 10px;}
.srow2{display:grid;grid-template-columns:26px auto 1fr auto;align-items:center;gap:12px;
  padding:12px 10px;border-radius:10px;}
.srow2+.srow2{margin-top:2px;border-top:1px solid var(--bd);}
.srow2 .rnk2{font-family:"DM Mono",monospace;font-size:14px;color:var(--tx3);text-align:center;}
.srow2.gold .rnk2{color:var(--draw);}
.srow2 .sfl{display:inline-block;}
.srow2 .sinfo{min-width:0;}
.srow2 .sname{font-family:"Archivo",sans-serif;font-weight:800;font-size:15px;
  color:var(--tx);letter-spacing:.01em;}
.srow2 .smeta{font-size:13px;color:var(--tx3);font-family:"DM Mono",monospace;
  margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.srow2 .gcount{text-align:right;}
.srow2 .gcount .n{font-family:"Archivo",sans-serif;font-weight:900;font-size:22px;
  color:var(--tx);line-height:1;font-variant-numeric:tabular-nums;}
.srow2 .gcount .l{font-family:"DM Mono",monospace;font-size:11px;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.tpill{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;
  border-radius:16px;font-weight:700;font-size:12px;letter-spacing:.06em;
  text-transform:uppercase;white-space:nowrap;}
.tpill.contender{background:rgba(255,214,0,.1);color:var(--draw);border:1px solid rgba(255,214,0,.22);}
.tpill.darkhorse{background:rgba(240,130,50,.1);color:#f09050;border:1px solid rgba(240,130,50,.2);}
.tpill.wildcard{background:rgba(255,255,255,.07);color:var(--tx2);border:1px solid var(--bd2);}

/* вФАвФА PLAYER DETAIL VIEW вФАвФА */
.back-row{display:flex;align-items:center;gap:9px;padding:18px 0 12px;
  cursor:pointer;color:var(--tx2);font-size:16px;font-weight:600;min-height:52px;}
.back-row:active{opacity:.6;}
.back-row .arr{width:20px;height:20px;display:flex;align-items:center;}
.back-row .arr svg{width:100%;height:100%;}
.det-hero{background:var(--s1);border-radius:var(--r);border:1px solid var(--bd);
  overflow:hidden;margin-bottom:22px;}
.det-hero-body{display:flex;align-items:center;gap:13px;padding:18px 18px 14px;}
.det-pdot{width:20px;height:20px;border-radius:50%;flex:0 0 auto;}
.det-pname{font-family:"Archivo",sans-serif;font-weight:900;text-transform:uppercase;
  letter-spacing:.05em;font-size:26px;color:var(--tx);}
.det-pts{margin-left:auto;text-align:right;}
.det-pts .big{font-family:"Archivo",sans-serif;font-weight:900;font-size:32px;
  color:var(--tx);line-height:1;font-variant-numeric:tabular-nums;}
.det-pts .lbl{font-family:"DM Mono",monospace;font-size:12px;color:var(--tx3);
  letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.det-stats{display:flex;gap:0;border-top:1px solid var(--bd);}
.dstat{flex:1;text-align:center;padding:12px 6px 14px;border-right:1px solid var(--bd);}
.dstat:last-child{border-right:0;}
.dstat .v{font-family:"Archivo",sans-serif;font-weight:900;font-size:20px;color:var(--tx);}
.dstat .l{font-family:"DM Mono",monospace;font-size:12px;color:var(--tx3);
  letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}

/* team section in detail */
.tsec{margin-bottom:24px;}
.tsec-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tsec-fl{display:inline-block;}
.tsec-nm{font-family:"Archivo",sans-serif;font-weight:900;text-transform:uppercase;
  letter-spacing:.04em;font-size:18px;color:var(--tx);}

/* match cards in detail */
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);
  overflow:hidden;margin-bottom:8px;cursor:pointer;transition:background .13s;}
.mc:active{filter:brightness(1.15);}
.mc.win{border-color:var(--win-bd);background:var(--win-bg);}
.mc.draw{border-color:var(--draw-bd);background:var(--draw-bg);}
.mc.loss{opacity:.55;}
.mc.live-m{border-color:rgba(255,23,68,.35);}
.mc-top{display:flex;justify-content:space-between;align-items:center;
  padding:9px 13px;border-bottom:1px solid var(--bd);
  font-family:"DM Mono",monospace;font-size:13px;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.06em;}
.mc-body{padding:14px 16px 12px;}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.mc-side{display:flex;flex-direction:column;align-items:center;gap:5px;}
.mc-flag{display:block;}
.mc-tname{font-family:"Archivo",sans-serif;font-weight:800;font-size:13px;
  letter-spacing:.07em;text-transform:uppercase;color:var(--tx);text-align:center;}
.mc-tname.mine{color:#fff;}
.mc-score{font-family:"Archivo",sans-serif;font-weight:900;font-size:28px;
  color:var(--tx);text-align:center;line-height:1;font-variant-numeric:tabular-nums;
  min-width:62px;}
.mc-vs{font-family:"DM Mono",monospace;font-size:13px;color:var(--tx3);text-align:center;}
.mc-foot{display:flex;justify-content:space-between;align-items:center;
  padding:9px 13px 11px;border-top:1px solid var(--bd);}
.mc-venue{font-size:13px;color:var(--tx3);}
.mc-badge{font-family:"Archivo",sans-serif;font-weight:800;font-size:13px;
  letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:16px;}
.mc-badge.win{color:var(--win);background:rgba(0,200,83,.16);}
.mc-badge.draw{color:var(--draw);background:rgba(255,214,0,.14);}
.mc-badge.loss{color:var(--tx2);background:rgba(255,255,255,.07);}
.mc-badge.upcoming{color:var(--tx2);background:var(--s3);}
.mc-no{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);
  padding:14px 16px;font-family:"DM Mono",monospace;font-size:14px;color:var(--tx3);}

/* вФАвФА LIVE SECTION вФАвФА */
.livesec{margin-top:18px;}
.livesec-hd{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.livesec-hd .live-badge{font-family:"Archivo",sans-serif;font-weight:900;
  font-size:17px;letter-spacing:.04em;text-transform:uppercase;}
.livesec-hd .live-badge .dot{width:9px;height:9px;}
.live-ct{font-family:"DM Mono",monospace;font-size:13px;color:var(--tx3);}
.livescroll{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:6px;}
.livescroll::-webkit-scrollbar{display:none;}
.lcard{flex:0 0 255px;background:var(--s1);border:1px solid rgba(255,23,68,.28);
  border-radius:var(--r);overflow:hidden;cursor:pointer;transition:background .13s;}
.lcard:active{background:var(--s2);}
.lcard.sweep{border-color:rgba(255,23,68,.55);}
.lcard-top{display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(255,23,68,.07);border-bottom:1px solid rgba(255,23,68,.15);
  font-family:"DM Mono",monospace;font-size:12px;color:var(--tx3);}
.lcard-body{padding:14px 12px 12px;}
.lcard-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.lcard-side{display:flex;flex-direction:column;align-items:center;gap:5px;}
.lcard-fl{display:inline-block;}
.lcard-nm{font-family:"Archivo",sans-serif;font-weight:800;font-size:11px;
  letter-spacing:.07em;text-transform:uppercase;color:var(--tx);text-align:center;}
.lcard-score{font-family:"Archivo",sans-serif;font-weight:900;font-size:28px;
  color:var(--tx);text-align:center;font-variant-numeric:tabular-nums;min-width:62px;}
.lcard-foot{padding:7px 12px 10px;border-top:1px solid var(--bd);
  display:flex;flex-wrap:wrap;gap:5px 10px;}

/* вФАвФА BOTTOM NAV (home only) вФАвФА */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:45;
  background:rgba(8,8,15,.96);backdrop-filter:blur(20px) saturate(160%);
  border-top:1px solid var(--bd2);
  display:flex;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;appearance:none;border:0;border-top:3px solid transparent;
  background:transparent;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;padding:10px 4px;
  cursor:pointer;font-family:"DM Sans",sans-serif;font-weight:700;
  font-size:11px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--tx3);min-height:58px;transition:color .15s,border-color .15s;}
.bnav-btn .bicon{width:21px;height:21px;display:flex;align-items:center;justify-content:center;}
.bnav-btn .bicon svg{width:100%;height:100%;}
.bnav-btn.on{color:var(--tx);border-top-color:var(--tx);}
.bnav-btn:active{opacity:.7;}
/* when 4+ items, tighten labels */
.bnav:has(.bnav-btn:nth-child(4)) .bnav-btn{font-size:10px;letter-spacing:.05em;}
.bnav:has(.bnav-btn:nth-child(4)) .bnav-btn .bicon{width:19px;height:19px;}

/* вФАвФА FLAG CHIPS вФАвФА */
.flagchip{display:inline-block;border-radius:5px;object-fit:cover;
  box-shadow:0 0 0 1px rgba(255,255,255,.14), 0 2px 5px rgba(0,0,0,.35);
  background:var(--s3);vertical-align:middle;}
.flagchip-sm{width:26px;height:19px;}
.flagchip-md{width:34px;height:25px;}
.flagchip-lg{width:64px;height:47px;border-radius:8px;}
.flagchip-na{display:inline-flex;align-items:center;justify-content:center;font-size:14px;
  box-shadow:none;background:transparent;}
.flagchip-na.flagchip-lg{font-size:30px;}

/* вФАвФА MATCH DETAIL вФАвФА */
.mhead{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  padding:20px 18px 18px;text-align:center;}
.mhead-round{font-family:"DM Mono",monospace;font-size:13px;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;}
.mstatus{display:inline-block;font-family:"Archivo",sans-serif;font-weight:800;
  font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;
  padding:6px 14px;border-radius:18px;margin-bottom:18px;}
.mstatus.live{background:rgba(255,23,68,.12);}
.mstatus.live .live-badge{font-size:12.5px;}
.mstatus.done{background:var(--s3);color:var(--tx2);}
.mstatus.pre{background:var(--s3);color:var(--tx2);}

/* вФАвФА STAGE CONFIG вФАвФА */
const STAGES=[
  {key:"group", label:"Group Stage",    test:r=>/group|first.stage/i.test(r||"x")},
  {key:"r32",   label:"Rd of 32",       test:r=>/\b32\b/i.test(r||"")},
  {key:"r16",   label:"Rd of 16",       test:r=>/\b16\b/i.test(r||"")},
  {key:"qf",    label:"Quarter-Finals", test:r=>/quarter/i.test(r||"")},
  {key:"sf",    label:"Semi-Finals",    test:r=>/semi/i.test(r||"")},
  {key:"third", label:"3rd Place",      test:r=>/third|3rd|bronze/i.test(r||"")},
  {key:"final", label:"Final",          test:r=>/\bfinal\b/i.test(r||"")&&!/semi|quarter|third|3rd/i.test(r||"")},
];
function stageOf(round){
  for(const s of STAGES) if(s.test(round||"")) return s.key;
  return "group";
}
function bestStage(playerName){
  const evs=EVENTS.filter(ev=>
    (ev.homeTeam&&ev.homeTeam.o===playerName)||(ev.awayTeam&&ev.awayTeam.o===playerName));
  const live=evs.find(e=>e.live);
  if(live) return stageOf(live.round);
  // prefer the NEXT upcoming match so the current/future stage shows first
  const up=evs.filter(e=>!e.finished).sort((a,b)=>(a.when||Infinity)-(b.when||Infinity));
  if(up.length) return stageOf(up[0].round);
  // all done вАФ show the most recent stage reached
  const fin=evs.filter(e=>e.finished).sort((a,b)=>(b.when||0)-(a.when||0));
  if(fin.length) return stageOf(fin[0].round);
  return "group";
}

/* вФАвФА NAME MATCHING вФАвФА */
function norm(s){
  return(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/&/g," and ").replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
}
const NMAP={};
for(const t of TEAMS){NMAP[norm(t.n)]=t;(t.a||[]).forEach(a=>NMAP[norm(a)]=t);}
function teamFor(n){return NMAP[norm(n)]||null;}

/* вФАвФА FETCH вФАвФА */
async function getJSON(url){
  const r=await fetch(url,{cache:"no-store"});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
const ESPN=d=>`${CONFIG.ESPN_BASE}?dates=${d}&limit=400`;
const ROUTES=[
  d=>`api/espn?dates=${d}`,
  d=>ESPN(d),
  d=>"https://api.allorigins.win/raw?url="+encodeURIComponent(ESPN(d)),
  d=>"https://proxy.killcors.com/?url="+encodeURIComponent(ESPN(d)),
  d=>"https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(ESPN(d))
];
let goodRoute=0;
async function smartGet(dates){
  const order=[goodRoute,0,1,2,3,4].filter((v,i,a)=>a.indexOf(v)===i);
  let err;
  for(const i of order){
    try{
      const d=await getJSON(ROUTES[i](dates));
      if(d&&Array.isArray(d.events)){goodRoute=i;return d;}
      err=new Error("shape");
    }catch(e){err=e;}
  }
  throw err||new Error("fail");
}
function ymd(d){return d.toISOString().slice(0,10).replace(/-/g,"");}
function addDays(d,n){const x=new Date(d);x.setUTCDate(x.getUTCDate()+n);return x;}
function toDate(s){return new Date(s.replace(/(\d{4})(\d{2})(\d{2})/,"$1-$2-$3")+"T00:00:00Z");}

async function loadData(){
  const start=toDate(CONFIG.START),end=toDate(CONFIG.END);
  const chunks=[];
  for(let c=new Date(start);c<=end;c=addDays(c,CONFIG.CHUNK_DAYS)){
    let ce=addDays(c,CONFIG.CHUNK_DAYS-1);if(ce>end)ce=end;
    chunks.push(`${ymd(c)}-${ymd(ce)}`);
  }
  const res=await Promise.allSettled(chunks.map(smartGet));
  const byId={};let ok=false;
  for(const r of res){
    if(r.status!=="fulfilled"||!r.value||!Array.isArray(r.value.events))continue;
    ok=true;
    for(const ev of r.value.events)byId[ev.id]=ev;
  }
  if(!ok)throw new Error("fetch-failed");
  EVENTS=Object.values(byId).map(normaliseEvent).filter(Boolean);
  if(!EVENTS.length)throw new Error("no-events");
}

function psc(s){const n=parseInt(s,10);return isNaN(n)?null:n;}
function slugLabel(s){return(s||"").replace(/-/g," ").replace(/\b\w/g,m=>m.toUpperCase());}

function normaliseEvent(ev){
  const comp=ev.competitions&&ev.competitions[0];
  if(!comp||!comp.competitors)return null;
  const hm=comp.competitors.find(c=>c.homeAway==="home");
  const aw=comp.competitors.find(c=>c.homeAway==="away");
  if(!hm||!aw)return null;
  const st=(comp.status&&comp.status.type)||(ev.status&&ev.status.type)||{};
  const live=st.state==="in";
  const finished=st.state==="post"&&st.completed!==false;
  const show=live||finished;
  const note=(comp.notes&&comp.notes[0]&&comp.notes[0].headline)||"";
  const venue=comp.venue?[comp.venue.fullName,comp.venue.address?.city].filter(Boolean).join(", "):"";
  const homeTeam=teamFor(hm.team.displayName)||teamFor(hm.team.abbreviation);
  const awayTeam=teamFor(aw.team.displayName)||teamFor(aw.team.abbreviation);

  // Goal-scorer events, straight from the same payload вАФ no extra fetches.
  // FIFA Golden Boot rules: shootout penalties and own goals don't count
  // toward a player's tally.
  const goals=(comp.details||[])
    .filter(d=>d.scoringPlay&&!d.ownGoal&&!d.shootout&&d.athletesInvolved&&d.athletesInvolved.length)
    .map(d=>{
      const ath=d.athletesInvolved[0];
      const tid=d.team&&String(d.team.id);
      const isHome=tid===String(hm.team.id);
      return{
        playerId:ath.id,
        playerName:ath.displayName||ath.shortName||ath.fullName||"Unknown",
        team:isHome?homeTeam:awayTeam,
        minute:(d.clock&&d.clock.displayValue)||""
      };
    });

  // Per-team match statistics, when ESPN has populated them (usually once
  // a match is live or finished). Turn the array into a simple lookup.
  function statMap(side){
    const out={};
    (side.statistics||[]).forEach(s=>{ out[s.name]=parseFloat(s.displayValue); });
    return out;
  }
  const homeStats=statMap(hm), awayStats=statMap(aw);

  return{
    id:ev.id,
    home:hm.team.displayName,away:aw.team.displayName,
    homeTeam,awayTeam,
    hs:show?psc(hm.score):null,
    as:show?psc(aw.score):null,
    live,finished,
    detail:st.shortDetail||st.detail||"",
    round:note||slugLabel(ev.season&&ev.season.slug),
    venue,when:ev.date?new Date(ev.date):null,goals,homeStats,awayStats,raw:ev
  };
}

/* вФАвФА TOP SCORERS (Golden Boot race) вФАвФА */
function topScorers(limit=5){
  const tally={};
  for(const ev of EVENTS){
    if(!ev.goals||!ev.goals.length) continue;
    for(const g of ev.goals){
      const key=g.playerId||g.playerName;
      if(!tally[key]) tally[key]={id:key,name:g.playerName,team:g.team,goals:0,matches:new Set()};
      tally[key].goals++;
      tally[key].matches.add(ev.id);
    }
  }
  return Object.values(tally)
    .map(p=>({...p,played:p.matches.size}))
    .sort((a,b)=>
      b.goals-a.goals ||              // most goals first
      a.played-b.played ||            // fewer matches = more efficient (FIFA tie-break)
      a.name.localeCompare(b.name))   // stable alphabetical fallback
    .slice(0,limit);
}

/* вФАвФА SCORING вФАвФА */
function compute(){
  const P={};
  PLAYERS.forEach(p=>P[p]={pts:0,gf:0,ga:0,w:0,d:0,l:0,played:0});
  for(const ev of EVENTS){
    if(!ev.finished)continue;
    sc(ev.homeTeam,ev.hs,ev.as);sc(ev.awayTeam,ev.as,ev.hs);
  }
  function sc(t,f,a){
    if(!t||f==null||a==null)return;
    const m=useMult?TIER[t.t].mult:1,b=f>a?3:(f===a?1:0);
    const p=P[t.o];p.pts+=b*m;p.gf+=f;p.ga+=a;p.played++;
    if(f>a)p.w++;else if(f===a)p.d++;else p.l++;
  }
  return{P};
}
function fp(n){return Number.isInteger(n)?n:n.toFixed(1);}
function fdt(d){return d.toLocaleString(undefined,{weekday:"short",day:"numeric",month:"short",hour:"numeric",minute:"2-digit"});}
function fgd(n){return(n>0?"+":"")+n;}

/* вФАвФА NAVIGATION вФАвФА */
function nav(v,p){
  view=v; selP=p||null; selTeam=null; selMatch=null;
  if(v==="player") selStage=null;
  render(); window.scrollTo(0,0);
}
function navTeam(teamName){
  view="team"; selTeam=teamName; selP=null; selMatch=null; selStage=null;
  render(); window.scrollTo(0,0);
}
function navMatch(eventId){
  // remember exactly where we came from so "back" returns there, not always home
  navMatch._returnView = view;
  navMatch._returnP = selP;
  navMatch._returnTeam = selTeam;
  view="match"; selMatch=eventId;
  render(); window.scrollTo(0,0);
}
function backFromMatch(){
  view = navMatch._returnView || "home";
  selP = navMatch._returnP || null;
  selTeam = navMatch._returnTeam || null;
  selMatch = null;
  render(); window.scrollTo(0,0);
}

/* вФАвФА RENDER ROUTER вФАвФА */
function render(){
  const{P}=compute();
  const app=document.getElementById("app");
  if(!app)return;
  if(view==="player"&&selP) app.innerHTML=renderPlayer(selP,P);
  else if(view==="team"&&selTeam) app.innerHTML=renderTeam(P);
  else if(view==="match"&&selMatch) app.innerHTML=renderMatch(selMatch);
  else app.innerHTML=renderHome(P);
  bind(P);
}

/* вФАвФА MATCH DETAIL (score header + animated stat bars) вФАвФА */
const STAT_DEFS=[
  {key:"totalShots",   label:"Total Shots"},
  {key:"shotsOnTarget", label:"Shots On Target"},
  {key:"_offTarget",   label:"Shots Off Target"},   // derived: total - on target
  {key:"possessionPct", label:"Possession", pct:true},
  {key:"wonCorners",   label:"Corners"},
  {key:"foulsCommitted", label:"Fouls"},
  {key:"goalAssists",  label:"Assists"}
];
function statRows(ev){
  return STAT_DEFS.map((def,i)=>{
    let hv, av;
    if(def.key==="_offTarget"){
      const hT=ev.homeStats.totalShots, hO=ev.homeStats.shotsOnTarget;
      const aT=ev.awayStats.totalShots, aO=ev.awayStats.shotsOnTarget;
      hv=(isFinite(hT)&&isFinite(hO))?Math.max(0,hT-hO):NaN;
      av=(isFinite(aT)&&isFinite(aO))?Math.max(0,aT-aO):NaN;
    }else{
      hv=ev.homeStats[def.key]; av=ev.awayStats[def.key];
    }
    if(!isFinite(hv)||!isFinite(av)||(hv===0&&av===0)) return ""; // no real data for this stat yet
    const total=hv+av;
    const hPct=total>0?(hv/total*100):50, aPct=100-hPct;
    const homeLeads=hv>=av;
    const hColor=homeLeads?"var(--draw)":"var(--tx3)";
    const aColor=!homeLeads?"var(--draw)":"var(--tx3)";
    const hDisp=def.pct?Math.round(hv)+"%":Math.round(hv);
    const aDisp=def.pct?Math.round(av)+"%":Math.round(av);
    return`<div class="statrow" style="--i:${i}">
      <div class="statrow-label">${def.label}</div>
      <div class="statrow-vals">
        <span class="statval">${hDisp}</span>
        <div class="statbar">
          <div class="statbar-home" data-w="${hPct.toFixed(1)}" style="background:${hColor}"></div>
          <div class="statbar-away" data-w="${aPct.toFixed(1)}" style="background:${aColor}"></div>
        </div>
        <span class="statval">${aDisp}</span>
      </div>
    </div>`;
  }).filter(Boolean).join("");
}

      const elim=played>0&&!hasMore;

/* вФАвФА TEAM DETAIL VIEW вФАвФА */
function renderTeam(P){
  const team=TEAMS.find(t=>t.n===selTeam);
  if(!team) return renderHome(P);

  // All events for this team, chronological
  const tevs=EVENTS.filter(ev=>
    (ev.homeTeam&&ev.homeTeam.n===team.n)||(ev.awayTeam&&ev.awayTeam.n===team.n)
  ).sort((a,b)=>(a.when||Infinity)-(b.when||Infinity));

  // Stage availability
  const present=new Set(["group"]);
  tevs.forEach(ev=>present.add(stageOf(ev.round)));
  const availStages=STAGES.filter(s=>present.has(s.key));

  // Determine active stage
  if(!selStage||!present.has(selStage)){
    const live=tevs.find(e=>e.live);
    if(live){selStage=stageOf(live.round);}
    else{
      const up=tevs.filter(e=>!e.finished).sort((a,b)=>(a.when||Infinity)-(b.when||Infinity));
      if(up.length){selStage=stageOf(up[0].round);}
      else{
        const fin=tevs.filter(e=>e.finished).sort((a,b)=>(b.when||0)-(a.when||0));
        selStage=fin.length?stageOf(fin[0].round):"group";
      }
    }
  }

  // Team stats from finished matches
  const fin=tevs.filter(e=>e.finished);
  let w=0,d=0,l=0,gf=0,ga=0;
  fin.forEach(ev=>{
    const isH=ev.homeTeam&&ev.homeTeam.n===team.n;
    const my=isH?ev.hs:ev.as, op=isH?ev.as:ev.hs;
    gf+=my; ga+=op;
    if(my>op)w++; else if(my===op)d++; else l++;
  });

  // Match cards for selected stage
  const stageEvs=tevs.filter(ev=>stageOf(ev.round)===selStage);
  const cards=stageEvs.map(ev=>matchCard(team,ev)).join("")||
    `<div class="mc-no">No matches at this stage yet вАФ check back as the tournament progresses.</div>`;

  const tabsHTML=availStages.map(s=>
    `<button class="stab${s.key===selStage?" on":""}" data-stage="${s.key}">${s.label}</button>`
  ).join("");

  return`
    <div class="back-row" id="back">
      <span class="arr">${ICONS.back}</span> The Draw
    </div>
    <div class="det-hero">
      <div class="det-hero-body">
        <span style="flex:0 0 auto">${flagChip(team,"lg")}</span>
        <div style="min-width:0">
          <div class="det-pname">${team.n}</div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:7px;flex-wrap:wrap">
            <span class="tpill ${TIER[team.t].cls}">${TIER[team.t].icon} ${TIER[team.t].label}</span>
            <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--tx3);
              display:inline-flex;align-items:center;gap:6px">
              <span class="pdot" style="background:${PC[team.o]}"></span>${team.o}'s team
            </span>
          </div>
        </div>
      </div>
      <div class="det-stats">
        <div class="dstat"><div class="v">${w}</div><div class="l">Wins</div></div>
        <div class="dstat"><div class="v">${d}</div><div class="l">Draws</div></div>
        <div class="dstat"><div class="v">${l}</div><div class="l">Losses</div></div>
        <div class="dstat"><div class="v">${fgd(gf-ga)}</div><div class="l">GD</div></div>
        <div class="dstat"><div class="v">${fin.length}</div><div class="l">Played</div></div>
      </div>
    </div>
    <div class="stage-tabs" id="stage-tabs">${tabsHTML}</div>
    <div id="stage-content">${cards}</div>
    <div style="height:24px"></div>`;
}

/* вФАвФА PLAYER DETAIL вФАвФА */
function renderPlayer(name,P){
  const pr=P[name];
  const myTeams=TEAMS.filter(t=>t.o===name);
  const myEvs=EVENTS.filter(ev=>
    (ev.homeTeam&&ev.homeTeam.o===name)||(ev.awayTeam&&ev.awayTeam.o===name)
  ).sort((a,b)=>(a.when||Infinity)-(b.when||Infinity));

  // Which stages have events for this player? Always include group.
  const stagesPresent=new Set(["group"]);
  myEvs.forEach(ev=>stagesPresent.add(stageOf(ev.round)));
  const availStages=STAGES.filter(s=>stagesPresent.has(s.key));

  // Set or validate selStage
  if(!selStage||!stagesPresent.has(selStage)) selStage=bestStage(name);

  // Matches for this stage
  const stageEvs=myEvs.filter(ev=>stageOf(ev.round)===selStage);

  // Team sections for this stage
  const sections=myTeams.map(team=>{
    const tevs=stageEvs.filter(ev=>
      (ev.homeTeam&&ev.homeTeam.n===team.n)||(ev.awayTeam&&ev.awayTeam.n===team.n));
    if(!tevs.length) return "";
    return`<div class="tsec">
      <div class="tsec-head">
        <span class="tsec-fl">${flagChip(team,"sm")}</span>
        <span class="tsec-nm">${team.n}</span>
        <span class="tpill ${TIER[team.t].cls}">${TIER[team.t].icon} ${TIER[team.t].label}</span>
      </div>
      ${tevs.map(ev=>matchCard(team,ev)).join("")}
    </div>`;
  }).filter(Boolean).join("");

  const empty=!sections?`<div class="mc-no">No matches at this stage yet вАФ check back as the tournament progresses.</div>`:"";

  const tabsHTML=availStages.map(s=>
    `<button class="stab${s.key===selStage?" on":""}" data-stage="${s.key}">${s.label}</button>`
  ).join("");

  return`
    <div class="back-row" id="back">
      <span class="arr">${ICONS.back}</span> All Players
    </div>
    <div class="det-hero">
      <div class="det-hero-body">
        <span class="det-pdot" style="background:${PC[name]}"></span>
        <span class="det-pname">${name}</span>
        <div class="det-pts"><div class="big">${fp(pr.pts)}</div><div class="lbl">Points</div></div>
      </div>
      <div class="det-stats">
        <div class="dstat"><div class="v">${pr.w}</div><div class="l">Wins</div></div>
        <div class="dstat"><div class="v">${pr.d}</div><div class="l">Draws</div></div>
        <div class="dstat"><div class="v">${pr.l}</div><div class="l">Losses</div></div>
        <div class="dstat"><div class="v">${fgd(pr.gf-pr.ga)}</div><div class="l">GD</div></div>
        <div class="dstat"><div class="v">${pr.played}</div><div class="l">Played</div></div>
      </div>
    </div>

    <div class="stage-tabs" id="stage-tabs" role="tablist">${tabsHTML}</div>

    <div id="stage-content">
      ${sections}${empty}
    </div>
    <div style="height:24px"></div>`;
}

function matchCard(team,ev){
  const isHome=ev.homeTeam&&ev.homeTeam.n===team.n;
  const myScore=isHome?ev.hs:ev.as;
  const opScore=isHome?ev.as:ev.hs;
  const opp=isHome ? ev.awayTeam : ev.homeTeam;          // may be null if unmatched
  const oppName=isHome ? (ev.awayTeam?ev.awayTeam.n:ev.away) : (ev.homeTeam?ev.homeTeam.n:ev.home);

  let oc="upcoming";
  if(ev.live)oc="live";
  else if(ev.finished){
    if(myScore>opScore)oc="win";
    else if(myScore===opScore)oc="draw";
    else oc="loss";
  }

  const mult=useMult?TIER[team.t].mult:1;
  const earned=oc==="win"?3*mult:oc==="draw"?1*mult:0;

  const mid=ev.finished||ev.live
    ?`<div class="mc-score">${myScore??"-"} вАУ ${opScore??"-"}</div>`
    :`<div class="mc-vs">${ev.when?fdt(ev.when):"TBC"}</div>`;

  const badge=oc==="win"
    ?`<span class="mc-badge win">вЬУ WIN${earned>0?" +"+fp(earned)+" pts":""}</span>`
    :oc==="draw"
    ?`<span class="mc-badge draw">DRAW${earned>0?" +"+fp(earned)+" pts":""}</span>`
    :oc==="loss"
    ?`<span class="mc-badge loss">LOSS</span>`
    :oc==="live"
    ?`<span class="mc-badge upcoming">LIVE ${ev.detail||""}</span>`
    :`<span class="mc-badge upcoming">${ev.when?fdt(ev.when):"Upcoming"}</span>`;

  const topR=ev.live
    ?`<span class="live-badge"><span class="dot"></span>LIVE</span>`
    :(ev.finished?"FT":(ev.when?fdt(ev.when):"TBC"));

  return`<div class="mc${oc==="win"?" win":oc==="draw"?" draw":oc==="loss"?" loss":oc==="live"?" live-m":""}" data-match="${ev.id}">
    <div class="mc-top"><span>${ev.round||"World Cup"}</span><span>${topR}</span></div>
    <div class="mc-body">
      <div class="mc-teams">
        <div class="mc-side">
          <span class="mc-flag">${flagChip(team,"sm")}</span>
          <span class="mc-tname mine">${team.n.toUpperCase()}</span>
        </div>
        ${mid}
        <div class="mc-side">
          <span class="mc-flag">${flagChip(opp,"sm")}</span>
          <span class="mc-tname">${oppName.toUpperCase()}</span>
        </div>
      </div>
    </div>
    <div class="mc-foot">
      <span class="mc-venue">${ev.venue?"рЯУН "+ev.venue:""}</span>
      ${badge}
    </div>
  </div>`;
}

/* вФАвФА BIND EVENTS вФАвФА */
function bind(P){
  // leaderboard rows вЖТ player detail
  document.querySelectorAll(".srow[data-p]").forEach(el=>{
    el.addEventListener("click",()=>nav("player",el.dataset.p));
  });
  document.getElementById("back")?.addEventListener("click",()=>{
    if(view==="match"){ backFromMatch(); return; }
    const fromTeam=view==="team";
    nav("home");
    if(fromTeam){
      // smooth-scroll back to the draw section after re-render
      requestAnimationFrame(()=>
        document.getElementById("anchor-draw")?.scrollIntoView({behavior:"smooth"}));
    }
  });
  document.getElementById("mult")?.addEventListener("change",e=>{useMult=e.target.checked;render();});
  document.getElementById("tab-up")?.addEventListener("click",()=>{fxTab="up";render();});
  document.getElementById("tab-res")?.addEventListener("click",()=>{fxTab="res";render();});

  // Draw team rows вЖТ team detail view
  document.querySelectorAll(".tmrow[data-team]").forEach(el=>{
    el.addEventListener("click",()=>navTeam(el.dataset.team));
  });

  // Fixture cards, live cards, and match-history cards вЖТ match detail view
  document.querySelectorAll(".fxcard[data-match],.lcard[data-match],.mc[data-match]").forEach(el=>{
    el.addEventListener("click",()=>navMatch(el.dataset.match));
  });

  // Bottom nav вАФ scroll to section + highlight active
  const bbtns=document.querySelectorAll(".bnav-btn[data-anchor]");
  bbtns.forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.getElementById(btn.dataset.anchor)
        ?.scrollIntoView({behavior:"smooth",block:"start"});
    });
  });
  if(bbtns.length){
    const anchors=["anchor-live","anchor-board","anchor-scorers","anchor-fixtures","anchor-draw"].filter(
      id=>document.getElementById(id)
    );
    const setActive=id=>{
      bbtns.forEach(b=>b.classList.toggle("on",b.dataset.anchor===id));
    };
    setActive(anchors[0]); // highlight first visible section by default
    const io=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting) setActive(e.target.id);});
    },{rootMargin:"-15% 0px -70% 0px"});
    anchors.forEach(id=>{const el=document.getElementById(id);if(el)io.observe(el);});
  }

  // Stage tab clicks
  document.querySelectorAll(".stab[data-stage]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      selStage=btn.dataset.stage; render();
      document.getElementById("stage-tabs")?.scrollIntoView({block:"nearest"});
    });
  });

  // Swipe left/right on stage content to change stage (works in both player + team views)
  const sc=document.getElementById("stage-content");
  if(sc&&(selP||selTeam)){
    const owner=selP||selTeam;
    const isTeamView=view==="team";
    let tx=0,ty=0;
    sc.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
    sc.addEventListener("touchend",e=>{
      const dx=e.changedTouches[0].clientX-tx;
      const dy=e.changedTouches[0].clientY-ty;
      if(Math.abs(dx)<44||Math.abs(dx)<Math.abs(dy)*1.2) return;
      const evs=isTeamView
        ?EVENTS.filter(ev=>(ev.homeTeam&&ev.homeTeam.n===selTeam)||(ev.awayTeam&&ev.awayTeam.n===selTeam))
        :EVENTS.filter(ev=>(ev.homeTeam&&ev.homeTeam.o===owner)||(ev.awayTeam&&ev.awayTeam.o===owner));
      const present=new Set(["group"]);
      evs.forEach(ev=>present.add(stageOf(ev.round)));
      const avail=STAGES.filter(s=>present.has(s.key)).map(s=>s.key);
      const cur=avail.indexOf(selStage);
      if(dx<0&&cur<avail.length-1){selStage=avail[cur+1];render();}
      else if(dx>0&&cur>0){selStage=avail[cur-1];render();}
    },{passive:true});
  }

  // animate bars (leaderboard points bars + match stat bars)
  requestAnimationFrame(()=>{
    document.querySelectorAll(".bar[data-w]").forEach(b=>{b.style.width=b.dataset.w+"%";});
    document.querySelectorAll(".statbar-home[data-w],.statbar-away[data-w]").forEach(b=>{
      b.style.width=b.dataset.w+"%";
    });
  });
}

/* вФАвФА STATUS вФАвФА */
function setStatus(ok){
  const hs=document.getElementById("hstatus"),ut=document.getElementById("utxt");
  if(!hs||!ut)return;
  const anyLive=EVENTS.some(e=>e.live);
  hs.classList.toggle("is-live",anyLive);
  const dot=hs.querySelector(".pulse");
  if(dot)dot.style.background=anyLive?"#ff1744":(ok?"#16a34a":"rgba(255,255,255,.25)");
  ut.textContent=ok?(anyLive?"LIVE ¬Ј ":"")+"Updated "+new Date().toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}):"offline";
  const bh=document.getElementById("bhint");
  if(bh)bh.textContent=EVENTS.filter(e=>e.finished).length+" matches played";
}

/* вФАвФА REFRESH вФАвФА */
let _timer=null;
function setRefreshTimer(){
  clearInterval(_timer);
  // refresh faster during live games so scores stay current
  const ms=EVENTS.some(e=>e.live)?30000:CONFIG.REFRESH_MS;
  _timer=setInterval(()=>refresh(false),ms);
}
async function refresh(manual){
  const btn=document.getElementById("rfbtn");
  if(manual&&btn){btn.classList.remove("spin");void btn.offsetWidth;btn.classList.add("spin");}
  try{
    await loadData();render();setStatus(true);setRefreshTimer();
  }catch(err){
    setStatus(false);
    if(!EVENTS.length){
      const app=document.getElementById("app");
      if(app){
        const local=!/^https?:$/.test(location.protocol);
        app.innerHTML=`<div class="note err" style="margin-top:20px">
          <b>Couldn't reach the match feed.</b><br>`
          +(local?`Open from the hosted <code>https://вА¶</code> link вАФ browsers block live data from local files.`
          :`Tried all routes. Retries every minute вАФ tap вЖї to force. On a restricted network? Try mobile data.`)
          +`</div>`;
      }
    }
  }
  if(btn)setTimeout(()=>btn.classList.remove("spin"),700);
}

function init(){
  document.getElementById("rfbtn").addEventListener("click",()=>refresh(true));
  refresh(false);
  // timer is set adaptively by setRefreshTimer() after each load
  document.addEventListener("visibilitychange",()=>{if(!document.hidden)refresh(false);});
}
init();
</script>
